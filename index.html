<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bari Securitizadora — Controle de Demandas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
  body { background: #f5f5f5; color: #111; }
  input, select, textarea, button { font-family: sans-serif; font-size: 14px; }
  input, select, textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #ccc;
    border-radius: 8px; background: #fff; color: #111; font-size: 14px;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid #378ADD; border-color: #378ADD; }
  label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
  .btn { padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; border: 1px solid #ccc; background: #fff; color: #444; }
  .btn-primary { background: #185FA5; color: #fff; border: none; font-weight: 500; }
  .btn-primary:hover { background: #0e4a82; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; display: none; z-index: 999; }
  .toast.show { display: block; }
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://ubgazsabtzdutgibrxbs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViZ2F6c2FidHpkdXRnaWJyeGJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjMxMDUsImV4cCI6MjA5MDczOTEwNX0.0O7vDwiL7uxr5uVSa9yGkx9bULtmkdV6p3CXbPFt7eI";
const HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY };

const COLS = [
  { id: "aberto",    label: "Não iniciado",  color: "#E6F1FB", border: "#378ADD", text: "#0C447C" },
  { id: "andamento", label: "Em andamento",  color: "#FAEEDA", border: "#BA7517", text: "#633806" },
  { id: "concluido", label: "Concluído",     color: "#EAF3DE", border: "#3B6D11", text: "#27500A" },
];
const TIPOS = ["Assembleia", "Aditamentos", "Oferta", "Interno"];
const RESPONSAVEIS = ["DGN", "LNM", "RAV", "VOL"];
const TIPO_COLORS = {
  Assembleia: { bg: "#EEEDFE", border: "#534AB7", text: "#3C3489" },
  Aditamentos:{ bg: "#FAEEDA", border: "#BA7517", text: "#633806" },
  Oferta:     { bg: "#E1F5EE", border: "#0F6E56", text: "#085041" },
  Interno:    { bg: "#FAECE7", border: "#993C1D", text: "#712B13" },
};

let cards = [];
let editingId = null;
let filterResp = "";
let filterTipo = "";

function toast(msg, err) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.background = err ? "#A32D2D" : "#333";
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

async function dbFetch() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/demandas?select=id,data", { headers: HEADERS });
  if (!res.ok) throw new Error("Erro " + res.status);
  const rows = await res.json();
  return rows.map(r => ({ id: r.id, ...r.data }));
}
async function dbUpsert(card) {
  const { id, ...rest } = card;
  const res = await fetch(SUPABASE_URL + "/rest/v1/demandas", {
    method: "POST",
    headers: { ...HEADERS, "Prefer": "resolution=merge-duplicates" },
    body: JSON.stringify({ id, data: rest })
  });
  if (!res.ok) throw new Error("Erro " + res.status);
}
async function dbDelete(id) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/demandas?id=eq." + id, { method: "DELETE", headers: HEADERS });
  if (!res.ok) throw new Error("Erro " + res.status);
}

function logo() {
  return `<div style="display:flex;align-items:center;gap:8px">
    <svg width="32" height="28" viewBox="0 0 40 34" fill="none">
      <path d="M4 28 Q4 6 12 6" stroke="#E05A1B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M11 28 Q11 10 19 10" stroke="#E05A1B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M18 28 Q18 14 26 14" stroke="#E87A3B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    </svg>
    <div style="line-height:1.15">
      <div style="color:#fff;font-weight:700;font-size:13px">Barcellos</div>
      <div style="color:#fff;font-weight:700;font-size:13px">Tucunduva</div>
    </div>
  </div>`;
}

function renderKanban() {
  const totalHoras = cards.reduce((s, c) => s + (parseFloat(c.horas) || 0), 0);
  const filtered = cards.filter(c =>
    (!filterResp || c.responsavel === filterResp) &&
    (!filterTipo || (c.tipos && c.tipos.includes(filterTipo)))
  );

  const colsHtml = COLS.map(col => {
    const colCards = filtered.filter(c => c.status === col.id);
    const cardsHtml = colCards.length === 0
      ? `<div style="border:1px dashed #ccc;border-radius:10px;padding:20px;text-align:center;font-size:12px;color:#888">Nenhuma demanda</div>`
      : colCards.map(card => {
          const tipos = (card.tipos || []).map(t => {
            const c = TIPO_COLORS[t];
            return `<span style="font-size:11px;padding:2px 8px;border-radius:5px;background:#fff;border:0.5px solid ${c.border};color:${c.text}">${t}</span>`;
          }).join("");
          const statusBtns = COLS.map(c => `
            <button onclick="moveCard('${card.id}','${c.id}')"
              style="font-size:11px;padding:3px 10px;background:${c.id===card.status?c.border:'#fff'};border:1px solid ${c.border};color:${c.id===card.status?'#fff':c.text};border-radius:6px;cursor:${c.id===card.status?'default':'pointer'};font-weight:${c.id===card.status?600:400}">
              ${c.label}
            </button>`).join("");
          return `
          <div style="background:${col.color};border:1.5px solid ${col.border};border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px">
            ${tipos ? `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">${tipos}</div>` : ""}
            <div style="font-weight:500;font-size:14px;margin-bottom:6px;color:${col.text}">${card.titulo}</div>
            ${card.responsavel ? `<div style="color:${col.text};margin-bottom:3px;opacity:0.85">👤 ${card.responsavel}</div>` : ""}
            ${card.email ? `<div style="color:${col.text};margin-bottom:3px;opacity:0.85;word-break:break-all">✉ ${card.email}</div>` : ""}
            ${card.dataInicio ? `<div style="color:${col.text};margin-bottom:3px;opacity:0.85">📅 ${card.dataInicio}${card.dataFim ? " → " + card.dataFim : ""}</div>` : ""}
            ${card.horas ? `<div style="color:${col.text};margin-bottom:3px;opacity:0.85">⏱ ${card.horas}h</div>` : ""}
            ${card.obs ? `<div style="color:${col.text};margin-bottom:8px;font-style:italic;opacity:0.8">${card.obs}</div>` : ""}
            <div style="border-top:1px solid ${col.border};margin-top:8px;padding-top:8px">
              <div style="font-size:11px;color:${col.text};opacity:0.7;margin-bottom:5px">Status:</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${statusBtns}
                <button onclick="openEdit('${card.id}')" style="font-size:11px;padding:3px 10px;background:rgba(255,255,255,0.6);border:1px solid ${col.border};border-radius:6px;cursor:pointer;color:${col.text}">Editar</button>
                <button onclick="deleteCard('${card.id}')" style="font-size:11px;padding:3px 10px;background:rgba(255,255,255,0.6);border:1px solid #E24B4A;color:#A32D2D;border-radius:6px;cursor:pointer">Excluir</button>
              </div>
            </div>
          </div>`;
        }).join("");

    return `<div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="width:10px;height:10px;border-radius:50%;background:${col.border}"></div>
        <span style="font-weight:500;font-size:14px">${col.label}</span>
        <span style="font-size:12px;color:#888;background:#eee;border-radius:10px;padding:1px 8px">${colCards.length}</span>
      </div>
      <div>${cardsHtml}</div>
    </div>`;
  }).join("");

  const respOptions = RESPONSAVEIS.map(r => `<option value="${r}" ${filterResp===r?"selected":""}>${r}</option>`).join("");
  const tipoOptions = TIPOS.map(t => `<option value="${t}" ${filterTipo===t?"selected":""}>${t}</option>`).join("");

  document.getElementById("app").innerHTML = `
    <div style="padding:16px 20px;max-width:960px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:16px">
          <div style="background:#1a1a2e;border-radius:10px;padding:10px 14px">${logo()}</div>
          <div style="border-left:1px solid #ddd;padding-left:16px">
            <div style="font-weight:500;font-size:16px">Bari Securitizadora</div>
            <div style="font-size:12px;color:#888">Controle de demandas</div>
          </div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          <div style="background:#eee;border-radius:8px;padding:6px 14px;font-size:13px;color:#555">
            ⏱ <strong>${totalHoras.toFixed(1)}h</strong> registradas
          </div>
          <select onchange="filterTipo=this.value;renderKanban()" style="font-size:13px;padding:6px 10px;width:auto">
            <option value="">Todos os tipos</option>${tipoOptions}
          </select>
          <select onchange="filterResp=this.value;renderKanban()" style="font-size:13px;padding:6px 10px;width:auto">
            <option value="">Todos os responsáveis</option>${respOptions}
          </select>
          <button class="btn btn-primary" onclick="openNew()">+ Nova demanda</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">${colsHtml}</div>
    </div>`;
}

function renderForm() {
  const card = editingId ? cards.find(c => c.id === editingId) : null;
  const v = card || { titulo:"", responsavel:"", email:"", dataInicio: new Date().toISOString().split("T")[0], dataFim:"", horas:"", obs:"", tipos:[] };

  const tiposBtns = TIPOS.map(t => {
    const sel = (v.tipos||[]).includes(t);
    const c = TIPO_COLORS[t];
    return `<button type="button" onclick="toggleTipo('${t}')" id="tipo-${t}"
      style="font-size:12px;padding:5px 14px;border-radius:6px;cursor:pointer;font-weight:${sel?500:400};background:${sel?c.bg:"#f0f0f0"};border:${sel?"2px solid "+c.border:"1px solid #ccc"};color:${sel?c.text:"#555"}">${t}</button>`;
  }).join("");

  const respOptions = RESPONSAVEIS.map(r => `<option value="${r}" ${v.responsavel===r?"selected":""}>${r}</option>`).join("");

  document.getElementById("app").innerHTML = `
    <div style="background:#f5f5f5;min-height:100vh;padding-bottom:40px">
      <div style="background:#1a1a2e;padding:16px 24px;display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:16px">
          <button onclick="renderKanban()" style="background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer">←</button>
          <span style="color:#fff;font-weight:500;font-size:16px">${editingId?"Editar demanda":"Nova demanda"}</span>
        </div>
        ${logo()}
      </div>
      <div style="max-width:520px;margin:24px auto;background:#fff;border-radius:12px;padding:28px 28px 24px;border:1px solid #ddd">
        <div style="margin-bottom:14px">
          <label>Título *</label>
          <input id="f-titulo" value="${v.titulo}" placeholder="Ex: Análise contratual..."/>
        </div>
        <div style="margin-bottom:14px">
          <label>Responsável</label>
          <select id="f-responsavel" style="width:100%">
            <option value="">Selecione...</option>${respOptions}
          </select>
        </div>
        <div style="margin-bottom:14px">
          <label>E-mail da solicitação</label>
          <input id="f-email" value="${v.email||""}" placeholder="Ex: Fwd: Assembleia Geral - Bari Securitizadora"/>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:14px">
          <div style="flex:1"><label>Data de início</label><input type="date" id="f-dataInicio" value="${v.dataInicio||""}"/></div>
          <div style="flex:1"><label>Data de encerramento</label><input type="date" id="f-dataFim" value="${v.dataFim||""}"/></div>
        </div>
        <div style="margin-bottom:14px">
          <label>Horas trabalhadas</label>
          <input type="number" id="f-horas" value="${v.horas||""}" placeholder="Ex: 2.5"/>
        </div>
        <div style="margin-bottom:14px">
          <label>Tipo(s)</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap">${tiposBtns}</div>
        </div>
        <div style="margin-bottom:20px">
          <label>Observações</label>
          <textarea id="f-obs" rows="3" placeholder="Anotações, próximos passos...">${v.obs||""}</textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn" onclick="renderKanban()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveCard()">Salvar</button>
        </div>
      </div>
    </div>`;
}

let formTipos = [];
function toggleTipo(t) {
  const idx = formTipos.indexOf(t);
  if (idx >= 0) formTipos.splice(idx, 1); else formTipos.push(t);
  const c = TIPO_COLORS[t];
  const sel = formTipos.includes(t);
  const btn = document.getElementById("tipo-" + t);
  btn.style.background = sel ? c.bg : "#f0f0f0";
  btn.style.border = sel ? "2px solid " + c.border : "1px solid #ccc";
  btn.style.color = sel ? c.text : "#555";
  btn.style.fontWeight = sel ? 500 : 400;
}

function openNew() {
  editingId = null;
  formTipos = [];
  renderForm();
}
function openEdit(id) {
  editingId = id;
  const card = cards.find(c => c.id === id);
  formTipos = [...(card.tipos || [])];
  renderForm();
}

async function saveCard() {
  const titulo = document.getElementById("f-titulo").value.trim();
  if (!titulo) { toast("Informe o título", true); return; }
  const id = editingId || Date.now().toString();
  const existing = editingId ? cards.find(c => c.id === editingId) : null;
  const card = {
    id,
    titulo,
    responsavel: document.getElementById("f-responsavel").value,
    email: document.getElementById("f-email").value,
    dataInicio: document.getElementById("f-dataInicio").value,
    dataFim: document.getElementById("f-dataFim").value,
    horas: document.getElementById("f-horas").value,
    obs: document.getElementById("f-obs").value,
    tipos: [...formTipos],
    status: existing ? existing.status : "aberto"
  };
  try {
    await dbUpsert(card);
    if (editingId) { cards = cards.map(c => c.id === editingId ? card : c); }
    else { cards.push(card); }
    toast("Salvo com sucesso!");
    editingId = null;
    renderKanban();
  } catch(e) { toast("Erro ao salvar: " + e.message, true); }
}

async function moveCard(id, status) {
  const card = cards.find(c => c.id === id);
  if (!card || card.status === status) return;
  card.status = status;
  try { await dbUpsert(card); renderKanban(); }
  catch(e) { toast("Erro ao mover: " + e.message, true); }
}

async function deleteCard(id) {
  if (!confirm("Excluir esta demanda?")) return;
  try {
    await dbDelete(id);
    cards = cards.filter(c => c.id !== id);
    renderKanban();
  } catch(e) { toast("Erro ao excluir: " + e.message, true); }
}

// Init
dbFetch().then(data => { cards = data; renderKanban(); })
  .catch(e => { toast("Erro ao carregar: " + e.message, true); renderKanban(); });
</script>
</body>
</html>
