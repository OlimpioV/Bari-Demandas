  * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

  .toast.show { display: block; }
  .tab { padding: 8px 18px; cursor: pointer; font-size: 14px; border: none; background: transparent; color: #555; border-bottom: 2px solid transparent; }

<div class="toast" id="toast"></div>

// Auth
function checkAuth() {
  const p = sessionStorage.getItem("bari_perfil");
  if (p) { perfil = p; return true; }
  return false;
}
function logout() {
  sessionStorage.removeItem("bari_perfil");
  perfil = null;
  renderLogin();
}

// Toast
function toast(msg, err) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.background = err ? "#dc2626" : "#0f172a";
  el.style.color = "#fff";
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

// Supabase
async function dbFetch() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/demandas?select=id,data", { headers: HEADERS });
  if (!res.ok) throw new Error("Erro " + res.status);
  const rows = await res.json();
  return rows.map(r => ({ id: r.id, ...r.data }));
}
async function dbUpsert(card) {
  const { id, ...rest } = card;
  const res = await fetch(SUPABASE_URL + "/rest/v1/demandas", {
    method: "POST",
    headers: { ...HEADERS, "Prefer": "resolution=merge-duplicates" },
    body: JSON.stringify({ id, data: rest })
  });
  if (!res.ok) throw new Error("Erro " + res.status);
}
async function dbDelete(id) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/demandas?id=eq." + id, { method: "DELETE", headers: HEADERS });
  if (!res.ok) throw new Error("Erro " + res.status);
}
async function dbLog(acao, detalhe) {
  await fetch(SUPABASE_URL + "/rest/v1/logs", {
    method: "POST",
    headers: HEADERS,
    body: JSON.stringify({ perfil, acao, detalhe })
  });
}
async function dbFetchLogs() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/logs?select=*&order=criado_em.desc&limit=100", { headers: HEADERS });
  if (!res.ok) throw new Error("Erro " + res.status);
  return res.json();
}

}

    mail:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>`,
    cal:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
    clock: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
    logout:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
  };
  return icons[type] || "";
}

// Login

        ${erro ? `<div style="font-size:13px;color:#A32D2D;margin-bottom:12px">${erro}</div>` : ""}

      </div>
    </div>`;
  setTimeout(() => { const el = document.getElementById("login-senha"); if(el) el.focus(); }, 100);

function doLogin() {
  const senha = document.getElementById("login-senha").value;
  const p = SENHAS[senha];
  if (p) {
    perfil = p;
    sessionStorage.setItem("bari_perfil", p);
    dbLog("login", "Acesso ao sistema");
    init();
  } else {
    renderLogin("Senha incorreta. Tente novamente.");
  }
}

// Kanban
function renderKanban() {
  abaAtiva = "kanban";
  const totalHoras = cards.reduce((s, c) => s + (parseFloat(c.horas) || 0), 0);
  const filtered = cards.filter(c =>
    (!filterResp || c.responsavel === filterResp) &&
    (!filterTipo || (c.tipos && c.tipos.includes(filterTipo)))

          const tipos = (card.tipos || []).map(t => {

          }).join("");
          const statusBtns = COLS.map(c => `
            <button ${isAdmin ? 'onclick="moveCard(\''+card.id+'\',\''+c.id+'\')"' : 'disabled'}
              style="font-size:11px;padding:3px 10px;background:${c.id===card.status?c.border:'#fff'};border:1px solid ${c.border};color:${c.id===card.status?'#fff':c.text};border-radius:6px;cursor:${isAdmin?(c.id===card.status?'default':'pointer'):'default'};font-weight:${c.id===card.status?600:400};opacity:${!isAdmin&&c.id!==card.status?0.5:1}">
              ${c.label}
            </button>`).join("");
          const acoes = isAdmin ? `
            <button onclick="openEdit('${card.id}')" style="font-size:11px;padding:3px 10px;background:rgba(255,255,255,0.6);border:1px solid ${col.border};border-radius:6px;cursor:pointer;color:${col.text}">Editar</button>
            <button onclick="deleteCard('${card.id}')" style="font-size:11px;padding:3px 10px;background:rgba(255,255,255,0.6);border:1px solid #E24B4A;color:#A32D2D;border-radius:6px;cursor:pointer">Excluir</button>` : "";
          return `
          <div style="background:${col.color};border:1.5px solid ${col.border};border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px">
            ${tipos ? `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">${tipos}</div>` : ""}
            <div style="font-weight:500;font-size:14px;margin-bottom:6px;color:${col.text}">${card.titulo}</div>
            ${card.responsavel ? `<div style="display:flex;align-items:center;gap:5px;color:${col.text};margin-bottom:3px;opacity:0.85">${iconSVG('user')} ${card.responsavel}</div>` : ""}
            ${card.email ? `<div style="display:flex;align-items:center;gap:5px;color:${col.text};margin-bottom:3px;opacity:0.85;word-break:break-all">${iconSVG('mail')} ${card.email}</div>` : ""}
            ${card.dataInicio ? `<div style="display:flex;align-items:center;gap:5px;color:${col.text};margin-bottom:3px;opacity:0.85">${iconSVG('cal')} ${card.dataInicio}${card.dataFim ? " → " + card.dataFim : ""}</div>` : ""}
            ${card.horas ? `<div style="display:flex;align-items:center;gap:5px;color:${col.text};margin-bottom:3px;opacity:0.85">${iconSVG('clock')} ${card.horas}h</div>` : ""}
            ${card.obs ? `<div style="color:${col.text};margin-bottom:8px;font-style:italic;opacity:0.8">${card.obs}</div>` : ""}

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="width:10px;height:10px;border-radius:50%;background:${col.border}"></div>

        <span style="font-size:12px;color:#888;background:#eee;border-radius:10px;padding:1px 8px">${colCards.length}</span>

  }).join("");

  const respOptions = RESPONSAVEIS.map(r => `<option value="${r}" ${filterResp===r?"selected":""}>${r}</option>`).join("");

          <select onchange="filterResp=this.value;renderKanban()" style="font-size:13px;padding:6px 10px;width:auto">
            <option value="">Todos os responsáveis</option>${respOptions}
          </select>
          ${isAdmin ? `<button class="btn btn-primary" onclick="openNew()">+ Nova demanda</button>` : ""}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">${colsHtml}</div>
    </div>`;
}

            <tbody>${rows}</tbody>

  } catch(e) { toast("Erro ao carregar histórico: " + e.message, true); }
}
  } catch(e) { toast("Erro ao carregar histórico: " + e.message, true); }

// Form

  const card = editingId ? cards.find(c => c.id === editingId) : null;

          <button class="btn" onclick="renderKanban()">Cancelar</button>

function toggleTipo(t) {
  const idx = formTipos.indexOf(t);
  if (idx >= 0) formTipos.splice(idx, 1); else formTipos.push(t);
  const c = TIPO_COLORS[t];
  const sel = formTipos.includes(t);
  const btn = document.getElementById("tipo-" + t);
  btn.style.background = sel ? c.bg : "#f0f0f0";
  btn.style.border = sel ? "2px solid " + c.border : "1px solid #ccc";
  btn.style.color = sel ? c.text : "#555";
  btn.style.fontWeight = sel ? 500 : 400;
}

function openNew() { editingId = null; formTipos = []; renderForm(); }
function openEdit(id) { editingId = id; const card = cards.find(c => c.id === id); formTipos = [...(card.tipos||[])]; renderForm(); }

async function saveCard() {
  const titulo = document.getElementById("f-titulo").value.trim();
  if (!titulo) { toast("Informe o título", true); return; }
  const id = editingId || Date.now().toString();
  const existing = editingId ? cards.find(c => c.id === editingId) : null;
  const card = {
    id, titulo,
    responsavel: document.getElementById("f-responsavel").value,
    email: document.getElementById("f-email").value,
    dataInicio: document.getElementById("f-dataInicio").value,
    dataFim: document.getElementById("f-dataFim").value,
    horas: document.getElementById("f-horas").value,
    obs: document.getElementById("f-obs").value,
    tipos: [...formTipos],
    status: existing ? existing.status : "aberto"
  };
  try {
    await dbUpsert(card);
    await dbLog(editingId ? "Editou demanda" : "Criou demanda", titulo);
    if (editingId) { cards = cards.map(c => c.id === editingId ? card : c); }
    else { cards.push(card); }
    toast("Salvo com sucesso!");
    editingId = null;
    renderKanban();
  } catch(e) { toast("Erro ao salvar: " + e.message, true); }
}

async function moveCard(id, status) {
  const card = cards.find(c => c.id === id);
  if (!card || card.status === status) return;
  const statusAnterior = card.status;
  card.status = status;
  try {
    await dbUpsert(card);
    const labelAntes = COLS.find(c => c.id === statusAnterior).label;
    const labelDepois = COLS.find(c => c.id === status).label;
    await dbLog("Moveu demanda", card.titulo + ": " + labelAntes + " → " + labelDepois);
    renderKanban();
  } catch(e) { toast("Erro ao mover: " + e.message, true); }
}

async function deleteCard(id) {
  if (!confirm("Excluir esta demanda?")) return;
  const card = cards.find(c => c.id === id);
  try {
    await dbDelete(id);
    await dbLog("Excluiu demanda", card ? card.titulo : id);
    cards = cards.filter(c => c.id !== id);
    renderKanban();
  } catch(e) { toast("Erro ao excluir: " + e.message, true); }
}

async function init() {
  document.getElementById("app").innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#888;font-size:14px">Carregando...</div>`;
  try { cards = await dbFetch(); } catch(e) { toast("Erro ao carregar: " + e.message, true); }
  renderKanban();
}

// Start
if (checkAuth()) { init(); } else { renderLogin(); }
</script>
</body>
</html>
